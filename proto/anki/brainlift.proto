syntax = "proto3";

option java_multiple_files = true;

package anki.brainlift;

import "anki/generic.proto";
import "anki/sync.proto";

service BrainLiftService {
  rpc ListQuestions(ListQuestionsRequest) returns (ListQuestionsResponse);
  rpc GetQuestion(GetQuestionRequest) returns (Question);
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc RecordAttempt(RecordAttemptRequest) returns (RecordAttemptResponse);
  rpc GetScores(generic.Empty) returns (GetScoresResponse);
  rpc GetDashboard(GetDashboardRequest) returns (DashboardState);
  rpc GetRecentAttempts(GetRecentAttemptsRequest)
      returns (GetRecentAttemptsResponse);
  rpc GetPerformanceChart(GetPerformanceChartRequest)
      returns (GetPerformanceChartResponse);
  rpc GetGreStudyStatus(generic.Empty) returns (GreStudyStatusResponse);
  // Temporarily raise today's new-card limit on the GRE deck so students can
  // keep building memory evidence after clearing due cards.
  rpc StartGreExtraStudy(generic.Empty) returns (StartGreExtraStudyResponse);
  rpc GetStudyPlan(GetStudyPlanRequest) returns (StudyPlanResponse);
  rpc GetReadinessCalibration(generic.Empty)
      returns (ReadinessCalibrationResponse);
  rpc GetPerformanceEval(generic.Empty) returns (PerformanceEvalResponse);
  rpc GetMemoryEval(generic.Empty) returns (MemoryEvalResponse);
  rpc GenerateBrainLiftEvalReport(generic.Empty)
      returns (BrainLiftEvalReportResponse);
  rpc GenerateBrainLiftAiEvalReport(generic.Empty)
      returns (BrainLiftAiEvalReportResponse);
  rpc GenerateQuestion(GenerateQuestionRequest)
      returns (GenerateQuestionResponse);
  // Post-answer explanation for a stored question. Uses the optional LLM path
  // when enabled/reachable, otherwise a deterministic templated explanation.
  // Never errors for AI-unavailability; falls back and marks provenance.
  rpc ExplainAnswer(ExplainAnswerRequest) returns (ExplainAnswerResponse);
  rpc GetTopicDetails(GetTopicDetailsRequest) returns (TopicDetailsResponse);
  // Incremental sync for brainlift.db (practice attempts). Collection sync uses
  // SyncService.
  rpc GetBrainLiftSyncStatus(generic.Empty) returns (BrainLiftSyncStatus);
  rpc PullBrainLiftChanges(BrainLiftSyncPullRequest)
      returns (BrainLiftSyncPullResponse);
  rpc PushBrainLiftChanges(BrainLiftSyncPushRequest)
      returns (BrainLiftSyncPushResponse);
  // Full sidecar sync bundle (sessions, questions, attempts, calibration rows).
  rpc PullBrainLiftSyncBundle(BrainLiftSyncPullRequest)
      returns (BrainLiftSyncBundleResponse);
  rpc PushBrainLiftSyncBundle(BrainLiftSyncBundlePushRequest)
      returns (BrainLiftSyncBundlePushResponse);
  // Download remote changes, merge locally, upload pending local changes.
  rpc PerformGreAtlasSync(PerformGreAtlasSyncRequest)
      returns (PerformGreAtlasSyncResponse);
  // Idempotent demo bootstrap: GRE deck, flashcards, and sample practice
  // history.
  rpc PrepareDemoCollection(generic.Empty)
      returns (PrepareDemoCollectionResponse);
  // Runtime build, sync, and feature verification for the settings panel.
  rpc GetGreAtlasVerification(GetGreAtlasVerificationRequest)
      returns (GreAtlasVerificationResponse);
  // AI explanation on/off toggle (persisted in collection config).
  rpc GetGreAtlasAiSettings(generic.Empty) returns (GreAtlasAiSettings);
  rpc SetGreAtlasAiEnabled(SetGreAtlasAiEnabledRequest)
      returns (GreAtlasAiSettings);
}

service BackendBrainLiftService {}

message Question {
  string id = 1;
  string topic = 2;
  string section = 3;
  string format = 4;
  string stem = 5;
  repeated string choices = 6;
  optional QuestionAttribution attribution = 7;
}

message QuestionAttribution {
  string source_name = 1;
  string source_section = 2;
  int64 generated_at_secs = 3;
  optional float confidence = 4;
  // "ai_generated" or "offline_template". Empty for legacy/foundation rows.
  string provenance = 5;
  // Real model id (e.g. "gpt-4o-mini") or "template_v1" for offline templates.
  string model_version = 6;
  // Grounding gate result, e.g. "approved" or "rejected_hallucination".
  string evaluation_status = 7;
  // Specific source excerpt/section id that grounded generation.
  string source_document = 8;
}

message GenerateQuestionRequest {
  string topic_id = 1;
  bool persist = 2;
}

message GenerateQuestionResponse {
  bool accepted = 1;
  float confidence = 2;
  string rejection_reason = 3;
  optional Question question = 4;
  optional QuestionAttribution attribution = 5;
  // "ai_generated" or "offline_template" — how the returned question was made.
  string provenance = 6;
  string model_version = 7;
  string evaluation_status = 8;
  // Human-readable provenance note, e.g. "Generated using offline templates."
  string provenance_note = 9;
}

message ExplainAnswerRequest {
  string question_id = 1;
  // The answer the learner selected (may differ from the correct answer).
  string selected_answer = 2;
}

// Worked solution for the post-answer explanation panel.
message SolutionExplanation {
  string concept = 1;
  string formula = 2;
  repeated string steps = 3;
  string final_answer = 4;
  string common_mistake = 5;
  repeated string key_takeaways = 6;
  // One-line citation string (source name + section when available).
  string citation = 7;
  // A second solving approach when one applies (empty otherwise).
  string alternative_method = 8;
  // "Easy" / "Medium" / "Hard", derived from the stored difficulty.
  string difficulty = 9;
  // Suggested solving budget, e.g. "~1.5 min".
  string estimated_time = 10;
  // Related GRE topics to review next.
  repeated string related_topics = 11;
}

// Per-choice reasoning for the post-answer explanation.
message AnswerChoiceExplanation {
  string choice = 1;
  bool is_correct = 2;
  // Legacy one-line tutor note; mirrors `reason` when structured fields are set.
  string reasoning = 3;
  // MCQ letter shown in the UI (A, B, C, …).
  string label = 4;
  // Why this choice is correct, or why it is wrong.
  string reason = 5;
  string likely_misconception = 6;
  // What flawed calculation or inference leads to this option.
  string student_reasoning = 7;
  string correct_reasoning = 8;
  // How the wrong path differs from the correct approach.
  string difference = 9;
  // How to recognize and avoid this trap on future GRE questions.
  string trap_recognition = 10;
}

message AnswerExplanation {
  // Short summary (legacy); mirrors the worked solution when present.
  string summary = 1;
  // Reasoning for each presented choice (correct + every distractor).
  repeated AnswerChoiceExplanation choices = 2;
  string correct_answer = 3;
  // Citation of the grounding source.
  string citation_source_name = 4;
  string citation_source_section = 5;
  string citation_excerpt = 6;
  // "ai_generated" or "offline_template".
  string provenance = 7;
  // Human-readable note; exactly "Generated using offline templates." for the
  // deterministic fallback.
  string provenance_note = 8;
  string model_version = 9;
  SolutionExplanation solution = 10;
}

message ExplainAnswerResponse {
  AnswerExplanation explanation = 1;
}

message ListQuestionsRequest {
  uint32 limit = 1;
  // When set, return questions whose topic equals or extends this prefix
  // (e.g. "gre::quant" matches "gre::quant::algebra::linear").
  string topic_prefix = 2;
}

message ListQuestionsResponse {
  repeated Question questions = 1;
}

message GetQuestionRequest {
  string question_id = 1;
}

message CreateSessionRequest {
  // e.g. "practice" or "post_review". Defaults to "practice" when empty.
  string source = 1;
}

message CreateSessionResponse {
  string session_id = 1;
  int64 started_at_secs = 2;
  string source = 3;
}

message RecordAttemptRequest {
  string question_id = 1;
  string answer = 2;
  uint32 response_time_ms = 3;
  optional uint32 confidence = 4;
  optional string session_id = 5;
}

message RecordAttemptResponse {
  bool correct = 1;
  string explanation = 2;
  string topic = 3;
}

message ScoreSnapshot {
  option deprecated = true;
  optional float value = 1;
  bool sufficient_data = 2;
  string detail = 3;
}

// One evidence gate for memory, performance, or readiness scores.
message AbstentionRequirement {
  // Stable id, e.g. "fsrs_enabled", "studied_cards", "topic_coverage",
  // "practice_attempts".
  string id = 1;
  string label = 2;
  // Current progress when unmet, e.g. "35 of 50 studied cards".
  string status = 3;
  // What the student should do next when this requirement is unmet.
  string next_step = 4;
  bool met = 5;
}

message MemoryScore {
  optional float value = 1;
  optional float value_low = 2;
  optional float value_high = 3;
  bool sufficient_data = 4;
  string detail = 5;
  float coverage_ratio = 6;
  string abstain_reason = 7;
  uint32 studied_cards = 8;
  repeated AbstentionRequirement abstention_requirements = 9;
}

message PerformanceScore {
  optional float value = 1;
  optional float value_low = 2;
  optional float value_high = 3;
  bool sufficient_data = 4;
  string detail = 5;
  uint32 attempt_count = 6;
  string abstain_reason = 7;
  repeated AbstentionRequirement abstention_requirements = 8;
}

message ReadinessScore {
  // Projected GRE readiness index (0–100). Omitted when sufficient_data is
  // false.
  optional float projected_score = 1;
  optional float projected_score_low = 2;
  optional float projected_score_high = 3;
  string confidence_level = 4;
  float coverage_ratio = 5;
  int64 last_updated_millis = 6;
  string evidence_summary = 7;
  bool sufficient_data = 8;
  string abstain_reason = 9;
  // Honest calibration summary from held-out prediction/outcome pairs. Empty
  // when insufficient calibration history.
  string calibration_note = 10;
  optional float calibration_brier_score = 11;
  bool calibration_sufficient_data = 12;
  bool calibration_well_calibrated = 13;
  repeated AbstentionRequirement abstention_requirements = 14;
}

// Deterministic Quant + Verbal score estimate mapped from readiness (260–340
// combined, 130–170 per section). Uses confidence intervals when underlying
// evidence provides them.
message EstimatedGreScore {
  optional uint32 combined_score = 1;
  optional uint32 combined_score_low = 2;
  optional uint32 combined_score_high = 3;
  optional uint32 quant_score = 4;
  optional uint32 quant_score_low = 5;
  optional uint32 quant_score_high = 6;
  optional uint32 verbal_score = 7;
  optional uint32 verbal_score_low = 8;
  optional uint32 verbal_score_high = 9;
  // True when derived from sufficient readiness evidence (not preliminary).
  bool sufficient_data = 10;
  string detail = 11;
  string abstain_reason = 12;
  // Preliminary mapping from partial memory/performance/coverage when readiness
  // abstains.
  bool preliminary = 13;
}

message GetScoresResponse {
  MemoryScore memory = 1;
  PerformanceScore performance = 2;
  ReadinessScore readiness = 3;
  EstimatedGreScore estimated_gre = 4;
}

message DashboardSectionCoverage {
  string section = 1;
  string label = 2;
  float covered_exam_weight = 3;
  uint32 catalog_leaf_count = 4;
  uint32 covered_leaf_count = 5;
}

message DashboardCoverage {
  float weighted_ratio = 1;
  float unweighted_ratio = 2;
  uint32 catalog_leaf_count = 3;
  uint32 covered_leaf_count = 4;
  repeated DashboardSectionCoverage sections = 5;
  repeated DashboardTopicInsight uncovered_topics = 6;
  float coverage_threshold = 7;
  bool readiness_available = 8;
}

message DashboardTopicInsight {
  string topic_id = 1;
  string display_name = 2;
  string section = 3;
  float exam_weight = 4;
  optional float memory_score = 5;
  optional float practice_accuracy = 6;
  uint32 studied_cards = 7;
  bool covered = 8;
  string reason = 9;
  string study_label = 10;
}

message GetDashboardRequest {
  uint32 recent_activity_limit = 1;
  uint32 topic_insight_limit = 2;
}

message DashboardState {
  MemoryScore memory = 1;
  PerformanceScore performance = 2;
  ReadinessScore readiness = 3;
  DashboardCoverage coverage = 4;
  repeated DashboardTopicInsight weak_topics = 5;
  repeated DashboardTopicInsight recommended_topics = 6;
  repeated PerformanceAttempt recent_activity = 7;
  int64 computed_at_millis = 8;
  EstimatedGreScore estimated_gre = 9;
}

message PerformanceAttempt {
  string question_id = 1;
  string topic = 2;
  int64 answered_at_secs = 3;
  string answer = 4;
  bool correct = 5;
  uint32 response_time_ms = 6;
  optional uint32 confidence = 7;
  optional float difficulty = 8;
  optional string session_id = 9;
}

message GetRecentAttemptsRequest {
  uint32 limit = 1;
  // When set, only return attempts for matching topics (same rules as
  // ListQuestionsRequest.topic_prefix).
  string topic_prefix = 2;
}

message GetRecentAttemptsResponse {
  repeated PerformanceAttempt attempts = 1;
}

enum PerformanceChartHorizon {
  PERFORMANCE_CHART_HORIZON_UNSPECIFIED = 0;
  PERFORMANCE_CHART_HORIZON_1D = 1;
  PERFORMANCE_CHART_HORIZON_3D = 2;
  PERFORMANCE_CHART_HORIZON_7D = 3;
  PERFORMANCE_CHART_HORIZON_30D = 4;
  PERFORMANCE_CHART_HORIZON_ALL = 5;
}

message PerformanceChartBucket {
  string label = 1;
  int64 start_secs = 2;
  int64 end_secs = 3;
  uint32 questions = 4;
  uint32 correct = 5;
  uint32 incorrect = 6;
  optional float accuracy = 7;
}

message GetPerformanceChartRequest {
  PerformanceChartHorizon horizon = 1;
  // When set, only include attempts for matching topics (same rules as
  // ListQuestionsRequest.topic_prefix).
  string topic_prefix = 2;
}

message GetPerformanceChartResponse {
  repeated PerformanceChartBucket buckets = 1;
  bool has_any_attempts = 2;
}

message GetTopicDetailsRequest {
  string topic_id = 1;
  uint32 practice_question_limit = 2;
  uint32 recent_attempt_limit = 3;
}

message TopicReadinessContribution {
  float exam_weight = 1;
  float section_weight = 2;
  bool covered = 3;
  optional float coverage_contribution = 4;
  optional float memory_contribution = 5;
  optional float performance_contribution = 6;
  optional float estimated_total_contribution = 7;
  string summary = 8;
}

message TopicDetailsResponse {
  string topic_id = 1;
  string display_name = 2;
  string section = 3;
  float exam_weight = 4;
  bool is_leaf = 5;
  uint32 studied_cards = 6;
  uint32 total_cards = 7;
  uint32 mastered_cards = 8;
  optional float memory_score = 9;
  optional float avg_retrievability_low = 10;
  optional float avg_retrievability_high = 11;
  uint32 total_reviews = 12;
  optional float practice_accuracy = 13;
  uint32 practice_correct = 14;
  uint32 practice_total = 15;
  bool covered = 16;
  TopicReadinessContribution readiness_contribution = 17;
  repeated Question practice_questions = 18;
  repeated PerformanceAttempt recent_attempts = 19;
  optional float global_readiness_score = 20;
  string global_readiness_summary = 21;
  optional string flashcard_schedule_hint = 22;
  optional uint32 flashcards_due_now = 23;
  optional uint32 flashcards_next_due_in_days = 24;
}

message GreStudyStatusResponse {
  string deck_name = 1;
  bool deck_exists = 2;
  uint32 new_count = 3;
  uint32 learn_count = 4;
  uint32 review_count = 5;
  // New cards in the GRE deck not yet introduced today (ignores daily limit).
  uint32 available_new_count = 6;
  // Cards unlockable right now via StartGreExtraStudy (0 when capped or none left).
  uint32 extra_study_available = 7;
  // Earliest scheduled review across the GRE deck when nothing is due now.
  optional uint32 next_review_in_days = 8;
}

message StartGreExtraStudyResponse {
  uint32 cards_unlocked = 1;
  uint32 new_count = 2;
  uint32 learn_count = 3;
  uint32 review_count = 4;
}

message GetStudyPlanRequest {
  uint32 limit = 1;
}

message StudyPlanDailyTask {
  // Stable id, e.g. "review_cards", "practice_questions", "focus_topic".
  string id = 1;
  string title = 2;
  string detail = 3;
  uint32 target_count = 4;
  optional string topic_id = 5;
  optional string topic_display_name = 6;
  optional string flashcard_schedule_hint = 7;
  optional uint32 flashcards_due_now = 8;
  optional uint32 flashcards_next_due_in_days = 9;
}

message DailyStudyPlan {
  string headline = 1;
  repeated StudyPlanDailyTask tasks = 2;
  // Deterministic explanation tied to readiness and mastery signals.
  string rationale = 3;
}

message StudyPlanRecommendation {
  string topic_id = 1;
  string display_name = 2;
  string section = 3;
  float exam_weight = 4;
  optional float memory_score = 5;
  optional float practice_accuracy = 6;
  uint32 studied_cards = 7;
  bool covered = 8;
  float priority_score = 9;
  string explanation = 10;
  repeated string factors = 11;
}

message StudyPlanResponse {
  DashboardCoverage coverage = 1;
  repeated StudyPlanRecommendation recommendations = 2;
  int64 computed_at_millis = 3;
  string summary = 4;
  DailyStudyPlan daily_plan = 5;
}

message ReadinessCalibrationBin {
  float bin_low = 1;
  float bin_high = 2;
  float predicted_mean = 3;
  float outcome_mean = 4;
  uint32 count = 5;
}

message ReadinessCalibrationStats {
  uint32 total_predictions = 1;
  uint32 resolved_outcomes = 2;
  uint32 held_out_count = 3;
  optional float brier_score = 4;
  optional float mean_absolute_error = 5;
  repeated ReadinessCalibrationBin calibration_curve = 6;
  bool sufficient_data = 7;
  bool well_calibrated = 8;
  string assessment = 9;
}

message ReadinessCalibrationResponse {
  ReadinessScore readiness = 1;
  ReadinessCalibrationStats calibration = 2;
  int64 computed_at_millis = 3;
}

message PerformanceConfidenceInterval {
  float level = 1;
  float low = 2;
  float high = 3;
  string method = 4;
}

message PerformanceConfusionMatrix {
  uint32 true_positive = 1;
  uint32 false_positive = 2;
  uint32 true_negative = 3;
  uint32 false_negative = 4;
}

message PerformanceTopicAccuracy {
  string topic_id = 1;
  string display_name = 2;
  uint32 attempt_count = 3;
  uint32 correct_count = 4;
  float accuracy = 5;
}

message PerformanceEvalMetrics {
  uint32 attempt_count = 1;
  uint32 correct_count = 2;
  float accuracy = 3;
  PerformanceConfidenceInterval accuracy_ci = 4;
  PerformanceConfusionMatrix confusion = 5;
  repeated PerformanceTopicAccuracy topic_accuracy = 6;
}

message PerformanceEvalResponse {
  string model_version = 1;
  bool sufficient_data = 2;
  string assessment = 3;
  PerformanceEvalMetrics test = 4;
  int64 computed_at_millis = 5;
}

message MemoryCalibrationBin {
  float bin_low = 1;
  float bin_high = 2;
  float predicted_mean = 3;
  float outcome_mean = 4;
  uint32 count = 5;
}

message MemoryEvalResponse {
  string model_version = 1;
  bool fsrs_enabled = 2;
  uint32 held_out_review_count = 3;
  bool sufficient_data = 4;
  optional float brier_score = 5;
  optional float log_loss = 6;
  string assessment = 7;
  repeated MemoryCalibrationBin calibration_curve = 8;
  int64 computed_at_millis = 9;
}

message BrainLiftEvalReportResponse {
  string json = 1;
  string markdown = 2;
  string performance_markdown = 3;
}

message BrainLiftAiEvalReportResponse {
  string json = 1;
  string markdown = 2;
  // Whether the optional LLM path is enabled (API key set and not disabled).
  bool ai_enabled = 3;
}

// Syncable practice attempt row from brainlift.db.
message BrainLiftSyncAttempt {
  int64 id = 1;
  string question_id = 2;
  string topic = 3;
  optional float difficulty = 4;
  int64 answered_at_secs = 5;
  string answer = 6;
  bool correct = 7;
  uint32 response_time_ms = 8;
  optional uint32 confidence = 9;
  optional string session_id = 10;
  int32 usn = 11;
  int64 mtime_secs = 12;
}

message BrainLiftSyncStatus {
  int32 current_usn = 1;
  uint32 pending_upload_count = 2;
  int64 last_modified_secs = 3;
}

message BrainLiftSyncPullRequest {
  int32 after_usn = 1;
  uint32 limit = 2;
}

message BrainLiftSyncPullResponse {
  repeated BrainLiftSyncAttempt attempts = 1;
  int32 current_usn = 2;
}

message BrainLiftSyncConflict {
  int64 attempt_id = 1;
  string reason = 2;
  BrainLiftSyncAttempt kept = 3;
  BrainLiftSyncAttempt rejected = 4;
}

message BrainLiftSyncPushRequest {
  repeated BrainLiftSyncAttempt attempts = 1;
}

message BrainLiftSyncPushResponse {
  int32 current_usn = 1;
  repeated BrainLiftSyncConflict conflicts = 2;
  uint32 applied_count = 3;
}

message BrainLiftSyncSession {
  string id = 1;
  int64 started_at_secs = 2;
  optional int64 ended_at_secs = 3;
  string source = 4;
  int32 usn = 5;
  int64 mtime_secs = 6;
}

message BrainLiftSyncQuestion {
  string id = 1;
  string topic = 2;
  string section = 3;
  string format = 4;
  string stem = 5;
  repeated string choices = 6;
  string correct_answer = 7;
  string explanation = 8;
  optional float difficulty = 9;
  optional string source_name = 10;
  optional string source_section = 11;
  optional int64 generated_at_secs = 12;
  optional float generation_confidence = 13;
  optional string source_document = 14;
  optional string model_version = 15;
  optional string provenance = 16;
  optional string evaluation_status = 17;
  int32 usn = 18;
  int64 mtime_secs = 19;
}

message BrainLiftSyncPrediction {
  int64 id = 1;
  int64 predicted_at_secs = 2;
  float projected_score = 3;
  optional float projected_score_low = 4;
  optional float projected_score_high = 5;
  float memory_score = 6;
  float performance_score = 7;
  float coverage_ratio = 8;
  string confidence_level = 9;
  string model_version = 10;
  optional float outcome_score = 11;
  optional int64 outcome_observed_at_secs = 12;
  optional float outcome_memory_score = 13;
  optional float outcome_performance_score = 14;
  optional int32 practice_correct = 15;
  optional int32 practice_total = 16;
  int32 usn = 17;
  int64 mtime_secs = 18;
}

message BrainLiftSyncBundle {
  repeated BrainLiftSyncSession sessions = 1;
  repeated BrainLiftSyncQuestion questions = 2;
  repeated BrainLiftSyncAttempt attempts = 3;
  repeated BrainLiftSyncPrediction predictions = 4;
  int32 current_usn = 5;
  int64 last_modified_secs = 6;
}

message BrainLiftSyncBundleResponse {
  BrainLiftSyncBundle bundle = 1;
}

message BrainLiftSyncBundlePushRequest {
  BrainLiftSyncBundle bundle = 1;
}

message BrainLiftSyncBundlePushResponse {
  int32 current_usn = 1;
  uint32 applied_count = 2;
  repeated BrainLiftSyncConflict conflicts = 3;
}

message PerformGreAtlasSyncRequest {
  // When omitted, returns a local-only status refresh (no network).
  optional anki.sync.SyncAuth auth = 1;
}

message PerformGreAtlasSyncResponse {
  bool success = 1;
  string message = 2;
  uint32 downloaded_count = 3;
  uint32 uploaded_count = 4;
  uint32 applied_count = 5;
  repeated BrainLiftSyncConflict conflicts = 6;
  BrainLiftSyncStatus status = 7;
}

message PrepareDemoCollectionResponse {
  string deck_name = 1;
  bool deck_created = 2;
  uint32 cards_added = 3;
  uint32 practice_attempts_added = 4;
  uint32 due_new = 5;
  uint32 due_learn = 6;
  uint32 due_review = 7;
}

enum GreAtlasClientPlatform {
  GRE_ATLAS_CLIENT_UNSPECIFIED = 0;
  GRE_ATLAS_CLIENT_DESKTOP = 1;
  GRE_ATLAS_CLIENT_MOBILE = 2;
}

message GetGreAtlasVerificationRequest {
  GreAtlasClientPlatform client = 1;
}

message GreAtlasVerificationResponse {
  string desktop_build = 1;
  string mobile_build = 2;
  string sync_status = 3;
  string offline_queue = 4;
  string conflict_resolution = 5;
  string duplicate_protection = 6;
  string commit_hash = 7;
  string app_version = 8;
  string rust_version = 9;
  string ai_enabled = 10;
}

message GreAtlasAiSettings {
  // User toggle (persisted). When false, explanations always use offline templates.
  bool ai_enabled = 1;
  // Whether an API key is configured on this machine, so AI can actually run.
  bool ai_available = 2;
}

message SetGreAtlasAiEnabledRequest {
  bool enabled = 1;
}
